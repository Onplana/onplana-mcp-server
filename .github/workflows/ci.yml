# CI — typecheck + tests on every push + PR.
#
# Both packages share the workspace root; npm workspaces pulls in deps
# once. tsc runs against each package's tsconfig.json; vitest runs at
# the workspace root and discovers tests in packages/*/tests/.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci
      - run: npm run typecheck --workspaces --if-present
      - run: npm run test --workspaces --if-present
      - run: npm run build --workspaces --if-present
