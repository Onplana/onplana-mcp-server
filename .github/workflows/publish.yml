# Publish to npm via Trusted Publishing (OIDC).
#
# No long-lived NPM_TOKEN secret. GitHub Actions exchanges its OIDC
# token for a short-lived npm publish credential at runtime. The
# Trusted Publisher rule on npmjs.com binds this exact repo +
# workflow filename to the npm package, so an attacker compromising
# Actions on a different repo cannot publish here.
#
# Trigger: a published GitHub Release (NOT a raw tag push). Releases
# are the OIDC trust boundary — the workflow only earns a publishable
# token when the trigger event matches the Trusted Publisher rule's
# event constraint.
#
# Required npmjs.com configuration (one-time, done out-of-band by an
# operator with admin access on the npm package):
#   1. https://www.npmjs.com/package/onplana-mcp-server/access
#   2. "Trusted Publishers" → "Add a new Trusted Publisher"
#   3. Provider: GitHub Actions
#   4. Organization: Onplana            (case-sensitive — capital O)
#   5. Repository:   onplana-mcp-server
#   6. Workflow filename: publish.yml
#   7. (Optional) Environment: leave blank
#
# Mismatch on any of those four = 404 at publish time. Capital-O is
# the #1 cause of OIDC publish failures.
#
# npm CLI must be >= 11.5.1 for OIDC. The setup-node action ships an
# older version on some runner images, so we explicitly install latest
# before running publish.
name: Publish to npm (OIDC)

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for OIDC token exchange with npm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Use latest npm (required for OIDC trusted publishing)
        run: npm install -g npm@latest

      - name: Print npm version (sanity check, must be >= 11.5.1)
        run: npm --version

      - run: npm ci

      - run: npm run build --workspaces --if-present

      - run: npm test --workspaces --if-present

      # Publish the server-template package only. The client SDK
      # (packages/client) has its own future publish path; this
      # workflow is scoped to onplana-mcp-server.
      #
      # No NODE_AUTH_TOKEN env var — OIDC handles auth.
      # No --provenance flag — Trusted Publishing emits provenance
      # automatically by default.
      - name: Publish onplana-mcp-server
        run: npm publish --access public
        working-directory: packages/server-template
